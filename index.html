function getECA(ref){return ref?(ECA_REF[ref.substring(0,13)]??1):1;}
function fmt(n){const x=typeof n==='string'?parseFloat(n):n;return Number.isInteger(x)?String(x):x.toFixed(1);}

function parseERP(rows){
  const hdrs=rows[0].map(h=>String(h||'').trim().toUpperCase());
  const col=k=>hdrs.indexOf(k);
  const idx={dateliv:col('DATELIV'),numeroc:col('NUMEROC'),nom:col('NOM'),design:col('DESIGN'),qte:col('QTE'),qtereste:col('QTERESTE'),ref:col('REFERENCE')};
  const lignes=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];const design=String(r[idx.design]||'').trim();
    const qCol=idx.qtereste>=0?idx.qtereste:idx.qte;const qte=parseFloat(r[qCol])||0;
    if(qte<=0)continue;if(EXCL.some(ex=>design.toUpperCase().includes(ex)))continue;
    const pos=design.lastIndexOf('/ ');const couleur=pos>=0?design.slice(pos+2).trim():'';const produit=pos>0?design.slice(0,pos).trim():design;
    if(!couleur)continue;
    let dateLiv='';const rawLiv=r[idx.dateliv];
    if(rawLiv){if(typeof rawLiv==='number'){const d=new Date(Math.round((rawLiv-25569)*86400*1000));dateLiv=`${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;}else dateLiv=String(rawLiv).trim();}
    let semaine='';
    if(dateLiv.length>=8){const p=dateLiv.split('/');if(p.length===3){const liv=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));const mp=new Date(liv.getTime()-28*86400*1000);mp.setHours(0,0,0,0);mp.setDate(mp.getDate()+3-((mp.getDay()+6)%7));const w1=new Date(mp.getFullYear(),0,4);const wn=1+Math.round(((mp-w1)/86400000-3+((w1.getDay()+6)%7))/7);semaine=`S${String(wn).padStart(2,'0')}-${String(mp.getFullYear()).slice(-2)}`;}}
    lignes.push({id:String(r[idx.numeroc]||'').trim(),client:String(r[idx.nom]||'').trim().substring(0,40),ref:String(r[idx.ref]||'').trim(),design:produit.substring(0,60),couleur:couleur.substring(0,40),qte:Math.round(qte),dateLiv,semaine});
  }
  return lignes;
}

function lisser(lignes,nbJ){
  const map={};lignes.forEach(l=>{if(!map[l.couleur])map[l.couleur]={couleur:l.couleur,lignes:[],eca:0};map[l.couleur].lignes.push(l);map[l.couleur].eca+=getECA(l.ref)*l.qte;});
  const groupes=Object.values(map).sort((a,b)=>b.eca-a.eca);
  const jours=Array.from({length:nbJ},(_,i)=>({jour:i+1,eca:0,groupes:[]}));
  for(const g of groupes){if(g.eca===0)continue;const j=jours.reduce((m,x)=>x.eca<m.eca?x:m);j.groupes.push(g);j.eca+=g.eca;}
  return jours;
}

function exportPDF(jours,semaine,maxECA,cMap){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210;const M=14;
  doc.setFillColor(26,25,23);doc.rect(0,0,W,18,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('TOLIX · Planning Peinture',M,11);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Semaine '+semaine+' · Capacité '+maxECA+' ECA/jour · Imprimé le '+new Date().toLocaleDateString('fr-FR'),M,17);
  let y=24;
  jours.forEach(j=>{
    if(y>260){doc.addPage();y=14;}
    doc.setFillColor(240,237,230);doc.rect(M,y,W-M*2,7,'F');
    doc.setTextColor(26,25,23);doc.setFont('helvetica','bold');doc.setFontSize(10);
    doc.text('Jour '+j.jour+' — '+j.eca.toFixed(1)+' ECA',M+2,y+5);
    y+=9;
    j.groupes.sort((a,b)=>a.couleur.localeCompare(b.couleur)).forEach(g=>{
      if(y>265){doc.addPage();y=14;}
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(80,80,80);
      doc.text('● '+g.couleur+' — '+g.eca.toFixed(1)+' ECA',M+2,y+4);
      y+=6;
      g.lignes.forEach(l=>{
        if(y>270){doc.addPage();y=14;}
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(40,40,40);
        const peintStr=l.peint?'✓':'☐';
        doc.text(peintStr,M+3,y+3.5);
        doc.text(l.design.substring(0,45),M+9,y+3.5);
        doc.text('Qté: '+l.qte,M+120,y+3.5);
        doc.text(l.dateLiv,M+140,y+3.5);
        doc.setDrawColor(220,220,220);doc.line(M,y+5,W-M,y+5);
        y+=6;
      });
      y+=2;
    });
    y+=4;
  });
  doc.save('planning-peinture-'+semaine+'.pdf');
}

      e('span',{style:{fontSize:12,color:'var(--h)'}},'Jours / sem :'),
      ...[1,2,3,4,5,6].map(n=>e('button',{key:n,className:nbJ===n?'act':'',onClick:()=>setNbJ(n),style:{padding:'5px 10px',minWidth:36}},n)),
      e('span',{style:{fontSize:12,color:'var(--h)',marginLeft:8}},'Max ECA/j :'),
      e('input',{type:'number',value:maxECA,onChange:ev=>setMaxECA(+ev.target.value),style:{width:70},min:50,max:600,step:10}),
      e('span',{style:{fontSize:12,color:'var(--h)'}},'→ Capacité : '+cap+' ECA/sem')
    ),
    e('div',{className:'card',style:{padding:'20px'}},
      e('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        ...sems.map(s=>{
          const eca=ecaBySem[s];const over=eca>cap;const pct=Math.round(eca/maxV*100);const col=over?'#c0392b':eca>cap*0.85?'#e67e22':'#1d9e75';
          return e('div',{key:s,style:{display:'flex',alignItems:'center',gap:12}},
            e('span',{style:{fontSize:12,color:'var(--m)',width:64,flexShrink:0}},s),
            e('div',{style:{flex:1,height:22,background:'#f0ede6',borderRadius:4,overflow:'hidden',cursor:'pointer'},onClick:()=>onSem(s)},
              e('div',{style:{height:'100%',width:pct+'%',background:col,borderRadius:4,display:'flex',alignItems:'center',paddingLeft:8}},pct>18&&e('span',{style:{fontSize:11,color:'#fff',fontWeight:500}},fmt(eca)+' ECA'))
            ),
            pct<=18&&e('span',{style:{fontSize:11,color:'var(--h)',minWidth:40}},fmt(eca)),
            over&&e('span',{style:{fontSize:11,color:'var(--r)',flexShrink:0}},'⚠ dépasse')
          );
        })
      ),
      e('p',{style:{marginTop:16,fontSize:11,color:'var(--h)'}},'Cliquez sur une barre pour voir le planning de la semaine')
    )
  );
}

function VueReporting({lignes,statuts,onToggle,onCommande}){
  const byCde={};
  lignes.forEach(l=>{const k=l.id+'||'+l.ref;const peint=!!statuts[k];if(!byCde[l.id])byCde[l.id]={id:l.id,client:l.client,dateLiv:l.dateLiv,lignes:[],peintes:0};byCde[l.id].lignes.push({...l,peint});if(peint)byCde[l.id].peintes++;});
  const cmds=Object.values(byCde).sort((a,b)=>{const f=s=>{const p=s.split('/');return p.length===3?p[2]+p[1]+p[0]:'99999999'};return f(a.dateLiv).localeCompare(f(b.dateLiv));});
  return e('div',{className:'card'},e('table',null,
    e('thead',null,e('tr',null,e('th',{style:{width:'12%'}},'N° cde'),e('th',{style:{width:'28%'}},'Client'),e('th',{style:{width:'14%',textAlign:'center'}},'Date liv.'),e('th',{style:{width:'20%',textAlign:'center'}},'Avancement'),e('th',{style:{width:'12%',textAlign:'center'}},'Lignes'),e('th',{style:{width:'14%',textAlign:'center'}},'Statut'))),
    e('tbody',null,...cmds.map((cmd,i)=>{
      const pct=Math.round(cmd.peintes/cmd.lignes.length*100);
      const [bg,col,lbl]=pct===100?['#e8f4ee','var(--g)','Terminé']:pct>0?['#fef0e4','var(--o)','En cours']:['#fceaea','var(--r)','En attente'];
      return e('tr',{key:cmd.id,style:{background:i%2===0?'#fff':'#fafaf8'}},
        e('td',null,e('button',{onClick:()=>onCommande(cmd.id),style:{background:'none',border:'none',padding:0,color:'var(--u)',textDecoration:'underline',fontWeight:500,cursor:'pointer',fontSize:13}},cmd.id)),
        e('td',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:0},title:cmd.client},cmd.client),
        e('td',{style:{textAlign:'center',fontSize:12,color:'var(--m)'}},cmd.dateLiv),
        e('td',{style:{textAlign:'center'}},e('div',{style:{height:5,background:'#e5e2d9',borderRadius:99,overflow:'hidden',width:80,margin:'0 auto 3px'}},e('div',{style:{height:'100%',width:pct+'%',background:col,borderRadius:99}})),e('span',{style:{fontSize:11,color:'var(--h)'}},pct+'%')),
        e('td',{style:{textAlign:'center',color:'var(--m)'}},cmd.peintes+'/'+cmd.lignes.length),
        e('td',{style:{textAlign:'center'}},e('span',{className:'badge',style:{background:bg,color:col}},lbl))
      );
    }))
  ));
}

function VueDetail({cmdId,lignes,statuts,onToggle,onBack}){
  const ligs=lignes.filter(l=>l.id===cmdId).map(l=>({...l,peint:!!statuts[l.id+'||'+l.ref]}));
  const client=ligs[0]?.client||'';const np=ligs.filter(l=>l.peint).length;const pct=ligs.length>0?Math.round(np/ligs.length*100):0;
  const [bg,col,lbl]=pct===100?['#e8f4ee','var(--g)','Terminé']:pct>0?['#fef0e4','var(--o)','En cours']:['#fceaea','var(--r)','En attente'];
  return e('div',null,
    e('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:20}},
      e('button',{onClick:onBack},'← Retour'),
      e('div',{style:{flex:1}},e('h2',{style:{fontSize:18,fontWeight:700}},'Commande '+cmdId),e('p',{style:{fontSize:12,color:'var(--h)'}},client)),
      e('span',{className:'badge',style:{background:bg,color:col,fontSize:13,padding:'4px 12px'}},lbl+' · '+np+'/'+ligs.length+' · '+pct+'%')
    ),
    e('div',{className:'card'},e('table',null,
      e('thead',null,e('tr',null,e('th',{style:{width:'30%'}},'Désignation'),e('th',{style:{width:'22%'}},'Couleur'),e('th',{style:{width:'8%',textAlign:'center'}},'Qté'),e('th',{style:{width:'10%',textAlign:'center'}},'ECA'),e('th',{style:{width:'12%',textAlign:'center'}},'Semaine'),e('th',{style:{width:'10%',textAlign:'center'}},'Date liv.'),e('th',{style:{width:'8%',textAlign:'center'}},'Statut'))),
      e('tbody',null,...ligs.map((l,i)=>{
        const key=l.id+'||'+l.ref;const eu=getECA(l.ref);
        return e('tr',{key:i,style:{background:l.peint?'#f0faf4':i%2===0?'#fff':'#fafaf8'}},
          e('td',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:0},title:l.design},l.design),
          e('td',{style:{color:'var(--m)',fontSize:12}},l.couleur),
          e('td',{style:{textAlign:'center',fontWeight:500}},l.qte),
          e('td',{style:{textAlign:'center',color:'var(--h)'}},fmt(eu*l.qte)),
          e('td',{style:{textAlign:'center',fontSize:12,color:'var(--m)'}},l.semaine),
          e('td',{style:{textAlign:'center',fontSize:12,color:'var(--m)'}},l.dateLiv),
          e('td',{style:{textAlign:'center'}},e('button',{onClick:()=>onToggle(key),style:{padding:'2px 8px',fontSize:11,fontWeight:500,borderRadius:99,background:l.peint?'#e8f4ee':'#fceaea',color:l.peint?'var(--g)':'var(--r)',border:'1px solid '+(l.peint?'#b8ddc8':'#f0c0c0')}},l.peint?'✓ OK':'NOK'))
        );
      }))
    ))
  );
}

function App(){
  const [lignes,setLignes]=useState([]);
  const [statuts,setStatuts]=useState({});
  const [vue,setVue]=useState('planning');
  const [detail,setDetail]=useState(null);
  const [nomFich,setNomFich]=useState('');
  const [sync,setSync]=useState('⏳ Chargement...');
  const [loading,setLoading]=useState(true);
  const [importDate,setImportDate]=useState(null);
  const fileRef=useRef();

  useEffect(()=>{
    Promise.all([chargerStatuts(),chargerLignes()]).then(([st,lignesData])=>{
      setStatuts(st);
      if(lignesData&&lignesData.data&&lignesData.data.length>0){
        setLignes(lignesData.data);
        setNomFich(lignesData.fichier||'');
        setImportDate(lignesData.import_date||null);
        setSync('✓ Synchronisé');
      } else {
        setSync('');
      }
      setLoading(false);
    });
  },[]);

  const loadFile=useCallback(file=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      const parsed=parseERP(rows);
      setLignes(parsed);
      setNomFich(file.name);
      setVue('planning');setDetail(null);
      setSync('⏳ Sauvegarde...');
      const now=new Date().toISOString();
      setImportDate(now);
      sauvegarderLignes(parsed,file.name).then(()=>setSync('✓ Partagé avec tous'));
    };
    reader.readAsArrayBuffer(file);
  },[]);

  const toggle=useCallback(key=>{
    setStatuts(prev=>{
      const newVal=!prev[key];
      setSync('⏳ Sauvegarde...');
      sauvegarderStatut(key,newVal).then(()=>setSync('✓ Sauvegardé'));
      return {...prev,[key]:newVal};
    });
  },[]);

  const TABS=[{id:'planning',l:'Planning'},{id:'charge',l:'Charge ECA'},{id:'reporting',l:'Reporting'}];

  if(loading)return e('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--h)',fontSize:14}},'Chargement...');

  return e('div',null,
    e('header',null,
      e('span',{style:{fontSize:15,fontWeight:700,letterSpacing:'0.02em'}},'TOLIX · Peinture'),
      lignes.length>0&&e('nav',{style:{display:'flex',gap:2,marginLeft:16}},
        ...TABS.map(t=>e('button',{key:t.id,onClick:()=>{setVue(t.id);setDetail(null);},style:{background:vue===t.id&&!detail?'rgba(255,255,255,0.15)':'transparent',border:'none',color:'#fff',opacity:vue===t.id&&!detail?1:0.65,padding:'5px 12px',borderRadius:6,fontSize:13}},t.l))
      ),
      e('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:12}},
        sync&&e('span',{className:'sync'},sync),
        nomFich&&e('span',{style:{fontSize:11,color:'rgba(255,255,255,0.45)'}},nomFich),
        e('label',{style:{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'#fff',padding:'4px 12px',borderRadius:6,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
          '📂 '+(lignes.length>0?'Mettre à jour ERP':'Importer ERP'),
          e('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},onChange:ev=>loadFile(ev.target.files[0])})
        )
      )
    ),
    e('main',null,
      lignes.length===0
        ?e('div',null,
            e('div',{style:{textAlign:'center',paddingTop:40,marginBottom:32}},
              e('div',{style:{fontSize:28,fontWeight:700,marginBottom:8}},'Planning peinture · Tolix'),
              e('p',{style:{color:'var(--m)'}},'Importez votre export ERP Codial pour démarrer')
            ),
            e('div',{style:{maxWidth:480,margin:'0 auto',border:'2px dashed #d0cdc6',borderRadius:12,padding:'3rem',textAlign:'center',background:'#faf9f7',cursor:'pointer'},onClick:()=>fileRef.current?.click()},
              e('div',{style:{fontSize:40,marginBottom:12}},'📂'),
              e('p',{style:{fontWeight:500,marginBottom:6}},'Cliquez pour sélectionner votre export ERP'),
              e('p',{style:{fontSize:12,color:'var(--h)'}},'Le planning sera automatiquement partagé avec vos collègues')
            )
          )
        :detail
          ?e(VueDetail,{cmdId:detail,lignes,statuts,onToggle:toggle,onBack:()=>setDetail(null)})
          :vue==='planning'?e(VuePlanning,{lignes,statuts,onToggle:toggle,importDate})
          :vue==='charge'?e(VueCharge,{lignes,onSem:s=>{setVue('planning');}})
          :e(VueReporting,{lignes,statuts,onToggle:toggle,onCommande:id=>setDetail(id)})
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App,null));
</script>
</body>
</html>
