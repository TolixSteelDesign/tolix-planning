function getSemaineISO(date){
  var d=new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  var w1=new Date(d.getFullYear(),0,4);
  var wn=1+Math.round(((d-w1)/86400000-3+((w1.getDay()+6)%7))/7);
  return 'S'+String(wn).padStart(2,'0')+'-'+String(d.getFullYear()).slice(-2);
}

function exportDepartPDF(commandes,semaine){
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  doc.text('TOLIX - Departs semaine '+semaine,M,11);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Imprime le '+new Date().toLocaleDateString('fr-FR'),M,17);
  commandes.forEach(function(cmd){
    if(y>250){doc.addPage();y=14;}
    doc.setFillColor(240,237,230);doc.rect(M,y,W-M*2,8,'F');
    doc.setTextColor(26,25,23);doc.setFont('helvetica','bold');doc.setFontSize(10);
    doc.text('Cde '+cmd.id+' - '+cmd.client,M+2,y+5.5);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80,80,80);
    doc.text('Livraison : '+cmd.dateLiv,W-M-40,y+5.5);
    y+=10;
    var pct=cmd.peintes+'/'+cmd.lignes.length+' lignes peintes';
    doc.setFontSize(8);doc.setTextColor(100,100,100);
    doc.text(pct,M+2,y);y+=5;
    cmd.lignes.forEach(function(l){
      if(y>270){doc.addPage();y=14;}
      doc.setFont('helvetica','normal');doc.setFontSize(8);
      doc.setTextColor(l.peint?30:150,l.peint?100:30,l.peint?30:30);
      doc.text((l.peint?'[OK] ':'[NOK] ')+l.design.substring(0,45)+' x'+l.qte,M+4,y);
      doc.setDrawColor(220,220,220);doc.line(M,y+2,W-M,y+2);
      y+=5;
    });
    y+=4;
  });
  doc.save('departs-'+semaine+'.pdf');
}

function VueDepart(props){

  // Toutes les semaines de LIVRAISON disponibles (pas semaine de peinture)

  lignes.forEach(function(l){
    if(l.dateLiv&&l.dateLiv.length>=8){
      var p=l.dateLiv.split('/');
      if(p.length===3){
        var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
        semsLivSet[getSemaineISO(d)]=true;
      }
    }
  });
  var sems=Object.keys(semsLivSet).sort();

  // Grouper par commande pour la semaine selectionnee
  var byCde={};
  lignes.forEach(function(l){
    // Filtrer par date de livraison dans la semaine selectionnee
    var semLiv='';
    if(l.dateLiv&&l.dateLiv.length>=8){
      var p=l.dateLiv.split('/');
      if(p.length===3){
        var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
        semLiv=getSemaineISO(d);
      }
    }
    if(semLiv!==semSel)return;
    var peint=!!statuts[l.id+'||'+l.ref];
    if(!byCde[l.id])byCde[l.id]={id:l.id,client:l.client,dateLiv:l.dateLiv,lignes:[],peintes:0};
    byCde[l.id].lignes.push(Object.assign({},l,{peint:peint}));
    if(peint)byCde[l.id].peintes++;
  });

  var cmds=Object.values(byCde).sort(function(a,b){
    var f=function(s){var p=s.split('/');return p.length===3?p[2]+p[1]+p[0]:'99999999';};
    return f(a.dateLiv).localeCompare(f(b.dateLiv));

    cmds.length===0

          var pct=Math.round(cmd.peintes/cmd.lignes.length*100);
          var bg,col,lbl;
          if(pct===100){bg='#e8f4ee';col='var(--g)';lbl='Pret';}
          else if(pct>0){bg='#fef0e4';col='var(--o)';lbl='Partiel';}
          else{bg='#fceaea';col='var(--r)';lbl='Non peint';}
          return h('div',{key:cmd.id,className:'card',style:{marginBottom:12}},
            h('div',{style:{padding:'10px 16px',background:'#fafaf8',borderBottom:'1px solid var(--bl)',display:'flex',alignItems:'center',justifyContent:'space-between'}},

function getECA(ref,override){
  if(!ref)return 1;
  var k=ref.substring(0,13);
  if(override&&override[k]!==undefined)return override[k];
  return ECA_REF[k]!==undefined?ECA_REF[k]:1;
}
function fmt(n){const x=typeof n==='string'?parseFloat(n):n;return Number.isInteger(x)?String(x):x.toFixed(1);}

function parseERP(rows){
  var hdrs=rows[0].map(function(r){return String(r||'').trim().toUpperCase();});
  var col=function(k){return hdrs.indexOf(k);};
  var idx={dateliv:col('DATELIV'),numeroc:col('NUMEROC'),nom:col('NOM'),design:col('DESIGN'),qte:col('QTE'),qtereste:col('QTERESTE'),ref:col('REFERENCE')};
  var out=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    var design=String(r[idx.design]||'').trim();
    var qCol=idx.qte; // Toujours utiliser QTE, jamais QTERESTE
    var qte=parseFloat(r[qCol])||0;
    if(qte<=0)continue;
    if(EXCL.some(function(x){return design.toUpperCase().includes(x);}))continue;
    var pos=design.lastIndexOf('/ ');
    var couleur=pos>=0?design.slice(pos+2).trim():'Sans couleur';
    var produit=pos>0?design.slice(0,pos).trim():design;
    var dateLiv='';
    var rawLiv=r[idx.dateliv];
    if(rawLiv){
      if(typeof rawLiv==='number'){
        var d=new Date(Math.round((rawLiv-25569)*86400*1000));
        dateLiv=String(d.getUTCDate()).padStart(2,'0')+'/'+String(d.getUTCMonth()+1).padStart(2,'0')+'/'+d.getUTCFullYear();
      }else dateLiv=String(rawLiv).trim();
    }
    var semaine='';
    if(dateLiv.length>=8){
      var p=dateLiv.split('/');
      if(p.length===3){
        var liv=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
        var mp=new Date(liv.getTime()-28*86400*1000);
        mp.setHours(0,0,0,0);mp.setDate(mp.getDate()+3-((mp.getDay()+6)%7));
        var w1=new Date(mp.getFullYear(),0,4);
        var wn=1+Math.round(((mp-w1)/86400000-3+((w1.getDay()+6)%7))/7);
        semaine='S'+String(wn).padStart(2,'0')+'-'+String(mp.getFullYear()).slice(-2);
      }
    }
    out.push({id:String(r[idx.numeroc]||'').trim(),client:String(r[idx.nom]||'').trim().substring(0,40),ref:String(r[idx.ref]||'').trim(),design:produit.substring(0,60),couleur:couleur.substring(0,40),qte:Math.round(qte),dateLiv,semaine});
  }
  return out;
}

function lisser(lignes,nbJ,ecaOvr){
  const map={};
  lignes.forEach(function(l){
    if(!map[l.couleur])map[l.couleur]={couleur:l.couleur,lignes:[],eca:0};
    map[l.couleur].lignes.push(l);
    map[l.couleur].eca+=getECA(l.ref,ecaOvr)*l.qte;
  });
  const groupes=Object.values(map).sort(function(a,b){return b.eca-a.eca;});
  const jours=[];
  for(var i=0;i<nbJ;i++)jours.push({jour:i+1,eca:0,groupes:[]});
  groupes.forEach(function(g){
    if(g.eca===0)return;
    var j=jours.reduce(function(m,x){return x.eca<m.eca?x:m;});
    j.groupes.push(g);j.eca+=g.eca;
  });
  return jours;
}

function VueReporting(props){
  var lignes=props.lignes,statuts=props.statuts,onToggle=props.onToggle,onCommande=props.onCommande,ancienIds=props.ancienIds||{};
  var sr=useState(''),recherche=sr[0],setRecherche=sr[1];
  var ss=useState('dateLiv'),triCol=ss[0],setTriCol=ss[1];
  var sd=useState(1),triDir=sd[0],setTriDir=sd[1];
  var byCde={};
  lignes.forEach(function(l){
    var k=l.id+'||'+l.ref;
    var peint=!!statuts[k];
    if(!byCde[l.id])byCde[l.id]={id:l.id,client:l.client,dateLiv:l.dateLiv,lignes:[],peintes:0};
    byCde[l.id].lignes.push(Object.assign({},l,{peint:peint}));
    if(peint)byCde[l.id].peintes++;
  });
  var dateKey=function(s){var p=s.split('/');return p.length===3?p[2]+p[1]+p[0]:'99999999';};
  var cmds=Object.values(byCde).sort(function(a,b){
    var va,vb;
    if(triCol==='id'){va=a.id;vb=b.id;}
    else if(triCol==='client'){va=a.client.toLowerCase();vb=b.client.toLowerCase();}
    else if(triCol==='dateLiv'){va=dateKey(a.dateLiv);vb=dateKey(b.dateLiv);}
    else if(triCol==='avancement'){va=a.peintes/a.lignes.length;vb=b.peintes/b.lignes.length;}
    else{va=a.dateLiv;vb=b.dateLiv;}
    if(va<vb)return -1*triDir;
    if(va>vb)return 1*triDir;
    return 0;
  });
  var cmdsFiltered=recherche
    ?cmds.filter(function(cmd){
        var r=recherche.toLowerCase();
        return cmd.id.toLowerCase().includes(r)||cmd.client.toLowerCase().includes(r);
      })
    :cmds;
  function trierPar(col){
    if(triCol===col){setTriDir(triDir*-1);}
    else{setTriCol(col);setTriDir(1);}
  }

    if(triCol!==col)return '';
    return triDir===1?' ^':' v';

    h('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}},

      recherche?h('button',{onClick:function(){setRecherche('');},style:{fontSize:12,padding:'5px 10px'}},'X'):null,
      h('span',{style:{fontSize:12,color:'var(--h)'}},cmdsFiltered.length+'/'+cmds.length+' commandes')

    h('div',{className:'card'},
      h('table',null,
        h('thead',null,h('tr',null,
          h('th',{style:Object.assign({width:'12%'},thStyle),onClick:function(){trierPar('id');}},'N cde'+flecheTri('id')),
          h('th',{style:Object.assign({width:'28%'},thStyle),onClick:function(){trierPar('client');}},'Client'+flecheTri('client')),
          h('th',{style:Object.assign({width:'14%',textAlign:'center'},thStyle),onClick:function(){trierPar('dateLiv');}},'Date liv.'+flecheTri('dateLiv')),
          h('th',{style:Object.assign({width:'20%',textAlign:'center'},thStyle),onClick:function(){trierPar('avancement');}},'Avancement'+flecheTri('avancement')),
          h('th',{style:{width:'10%',textAlign:'center'}},'Lignes'),
          h('th',{style:{width:'10%',textAlign:'center'}},'Statut'),
          h('th',{style:{width:'10%',textAlign:'center'}},'Nouveau')
        )),
        h('tbody',null,cmdsFiltered.map(function(cmd,i){
          var pct=Math.round(cmd.peintes/cmd.lignes.length*100);
          var bg,col,lbl;
          if(pct===100){bg='#e8f4ee';col='var(--g)';lbl='Termine';}

            h('td',{style:{textAlign:'center',fontSize:12,color:'var(--m)'}},cmd.dateLiv),
            h('td',{style:{textAlign:'center'}},
              h('div',{style:{height:5,background:'#e5e2d9',borderRadius:99,overflow:'hidden',width:80,margin:'0 auto 3px'}},

}

function VueECA(props){
  var ecaOverride=props.ecaOverride,setEcaOverride=props.setEcaOverride,peutImporter=props.peutImporter,setModal=props.setModal;
  var s1=useState(''),recherche=s1[0],setRecherche=s1[1];
  var s2=useState(null),editing=s2[0],setEditing=s2[1];
  var s3=useState(''),editVal=s3[0],setEditVal=s3[1];

  var refs=Object.keys(ECA_REF).sort(function(a,b){return a.localeCompare(b);});
  var filtrees=refs.filter(function(r){return r.toLowerCase().includes(recherche.toLowerCase());});

  function startEdit(ref){
    if(!peutImporter){setModal('import');return;}
    setEditing(ref);
    setEditVal(String(ecaOverride[ref]!==undefined?ecaOverride[ref]:ECA_REF[ref]));
  }

  function saveEdit(ref){
    var val=parseFloat(editVal);
    if(isNaN(val)||val<=0){setEditing(null);return;}
    setEcaOverride(function(prev){return Object.assign({},prev,{[ref]:val});});
    setEditing(null);
  }

  function resetRef(ref){
    if(!peutImporter){setModal('import');return;}
    setEcaOverride(function(prev){var n=Object.assign({},prev);delete n[ref];return n;});
  }

  return h('div',null,
    !peutImporter&&h('div',{style:{background:'#fef0e4',border:'1px solid #f0d0a0',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:13,color:'var(--o)'}},'Mot de passe administrateur requis pour modifier les ECA. Cliquez sur [Edition] en haut a droite.'),
    h('div',{style:{display:'flex',gap:8,alignItems:'center',marginBottom:16}},
      h('input',{type:'text',placeholder:'Rechercher une reference...',value:recherche,onChange:function(ev){setRecherche(ev.target.value);},style:{flex:1,maxWidth:400}}),
      h('span',{style:{fontSize:12,color:'var(--h)'}},filtrees.length+' references')
    ),
    h('div',{className:'card'},
      h('table',null,
        h('thead',null,h('tr',null,
          h('th',{style:{width:'35%'}},'Reference'),
          h('th',{style:{width:'15%',textAlign:'center'}},'ECA defaut'),
          h('th',{style:{width:'15%',textAlign:'center'}},'ECA actuel'),
          h('th',{style:{width:'15%',textAlign:'center'}},'')
        )),
        h('tbody',null,filtrees.map(function(ref,i){
          var defaut=ECA_REF[ref];
          var actuel=ecaOverride[ref]!==undefined?ecaOverride[ref]:defaut;
          var modifie=ecaOverride[ref]!==undefined;
          return h('tr',{key:ref,style:{background:i%2===0?'#fff':'#fafaf8'}},
            h('td',{style:{fontFamily:'monospace',fontSize:12,color:'var(--m)'}},ref),
            h('td',{style:{textAlign:'center',color:'var(--h)'}},''+defaut),
            h('td',{style:{textAlign:'center'}},
              editing===ref
                ?h('input',{type:'number',value:editVal,
                    onChange:function(ev){setEditVal(ev.target.value);},
                    onKeyDown:function(ev){if(ev.key==='Enter')saveEdit(ref);if(ev.key==='Escape')setEditing(null);},
                    onBlur:function(){saveEdit(ref);},
                    style:{width:70,textAlign:'center',padding:'3px 6px'},
                    autoFocus:true,min:0.25,step:0.25})
                :h('span',{onClick:function(){startEdit(ref);},
                    style:{cursor:peutImporter?'pointer':'default',fontWeight:600,fontSize:14,color:modifie?'var(--o)':'var(--t)',padding:'2px 8px',borderRadius:4,display:'inline-block'},
                    title:peutImporter?'Cliquer pour modifier':''},
                    ''+actuel+(modifie?' *':''))
            ),
            h('td',{style:{textAlign:'center'}},
              modifie&&h('button',{onClick:function(){resetRef(ref);},style:{fontSize:11,padding:'2px 8px',color:'var(--m)'}},'Reset')
            )
          );
        }))
      )
    ),
    h('p',{style:{marginTop:12,fontSize:11,color:'var(--h)'}},'Cliquez sur un ECA pour le modifier (mot de passe admin requis) - Appuyez sur Entree pour valider')
  );
}

function App(){
  var s0=useState([]),lignes=s0[0],setLignes=s0[1];
  var s1=useState({}),statuts=s1[0],setStatuts=s1[1];
  var s2=useState('planning'),vue=s2[0],setVue=s2[1];
  var s3=useState(null),detail=s3[0],setDetail=s3[1];
  var s4=useState(''),nomFich=s4[0],setNomFich=s4[1];
  var s5=useState('Chargement...'),sync=s5[0],setSync=s5[1];
  var s6=useState(true),loading=s6[0],setLoading=s6[1];
  var s7=useState(null),importDate=s7[0],setImportDate=s7[1];
  var s8=useState(false),peutEditer=s8[0],setPeutEditer=s8[1];
  var s9=useState(false),peutImporter=s9[0],setPeutImporter=s9[1];
  var s10=useState(null),modal=s10[0],setModal=s10[1];
  var s11=useState({}),ecaOverride=s11[0],setEcaOverride=s11[1];
  var s12=useState({}),ancienIds=s12[0],setAncienIds=s12[1];
  var fileRef=useRef();

  useEffect(function(){
    Promise.all([chargerStatuts(),chargerLignes()]).then(function(res){
      setStatuts(res[0]);
      var ld=res[1];
      if(ld&&ld.data&&ld.data.length>0){
        setLignes(ld.data);
        setNomFich(ld.fichier||'');
        setImportDate(ld.import_date||null);
        setAncienIds(ld.ancienIds||{});
        setSync('Synchronise');
      }else{
        setSync('');
      }
      setLoading(false);
    });
  },[]);

  var loadFile=useCallback(function(file){
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var wb=XLSX.read(ev.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      var parsed=parseERP(rows);
      setLignes(parsed);
      setNomFich(file.name);
      setVue('planning');setDetail(null);
      var now=new Date().toISOString();
      setImportDate(now);
      setSync('Sauvegarde...');
      sauvegarderLignes(parsed,file.name).then(function(){setSync('Partage avec tous');});
    };
    reader.readAsArrayBuffer(file);
  },[]);

  var toggle=useCallback(function(key){
    if(!peutEditer){setModal('edit');return;}
    setStatuts(function(prev){
      var newVal=!prev[key];
      setSync('Sauvegarde...');
      sauvegarderStatut(key,newVal).then(function(){setSync('Sauvegarde OK');});
      return Object.assign({},prev,{[key]:newVal});
    });
  },[peutEditer]);

  var TABS=[{id:'planning',l:'Planning'},{id:'charge',l:'Charge ECA'},{id:'reporting',l:'Reporting'},{id:'depart',l:'Depart semaine'},{id:'eca',l:'Ref. ECA'}];

  if(loading)return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--h)',fontSize:14}},'Chargement...');

  return h('div',null,
    h('header',null,
      h('span',{style:{fontSize:15,fontWeight:700,letterSpacing:'0.02em'}},'TOLIX · Peinture'),
      lignes.length>0&&h('nav',{style:{display:'flex',gap:2,marginLeft:16}},
        TABS.map(function(t){
          return h('button',{key:t.id,onClick:function(){setVue(t.id);setDetail(null);},
            style:{background:vue===t.id&&!detail?'rgba(255,255,255,0.15)':'transparent',border:'none',color:'#fff',opacity:vue===t.id&&!detail?1:0.65,padding:'5px 12px',borderRadius:6,fontSize:13}},t.l);
        })
      ),
      h('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}},
        !peutEditer&&h('button',{onClick:function(){setModal('edit');},className:'mobile-hide',style:{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'#fff',fontSize:12,padding:'4px 12px',borderRadius:6}},'[Consultation]'),
        peutEditer&&!peutImporter&&h('button',{onClick:function(){setModal('import');},style:{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'#fff',fontSize:12,padding:'4px 12px',borderRadius:6}},'[Edition]'),
        peutEditer&&peutImporter&&h('span',{style:{fontSize:11,color:'rgba(255,255,255,0.5)'}},'[Acces complet]'),
        sync&&h('span',{className:'sync'},sync),
        nomFich&&h('span',{style:{fontSize:11,color:'rgba(255,255,255,0.45)'},className:'mobile-hide'},nomFich),
        h('label',{style:{background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'#fff',padding:'4px 12px',borderRadius:6,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6},
          onClick:function(ev){if(!peutImporter){ev.preventDefault();setModal('import');}}},
          (lignes.length>0?'Mettre a jour ERP':'Importer ERP')+(peutImporter?'':' [verr.]'),
          h('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},
            onChange:function(ev){loadFile(ev.target.files[0]);}})
        )
      )
    ),
    h('div',{className:'mobile-nav'},
      [{id:'planning',l:'Planning',i:'📋'},{id:'charge',l:'ECA',i:'📊'},{id:'reporting',l:'Rapport',i:'📝'},{id:'depart',l:'Departs',i:'🚚'}].map(function(t){
        return h('button',{key:t.id,className:vue===t.id&&!detail?'act':'',
          onClick:function(){setVue(t.id);setDetail(null);}},
          h('span',{style:{fontSize:18}},t.i),
          h('span',null,t.l)
        );
      })
    ),
    h('main',null,
      lignes.length===0
        ?h('div',null,
            h('div',{style:{textAlign:'center',paddingTop:40,marginBottom:32}},
              h('div',{style:{fontSize:28,fontWeight:700,marginBottom:8}},'Planning peinture Tolix'),
              h('p',{style:{color:'var(--m)'}},'Importez votre export ERP Codial pour demarrer')
            ),
            h('div',{style:{maxWidth:480,margin:'0 auto',border:'2px dashed #d0cdc6',borderRadius:12,padding:'3rem',textAlign:'center',background:'#faf9f7',cursor:'pointer'},onClick:function(){fileRef.current&&fileRef.current.click();}},
              h('div',{style:{fontSize:40,marginBottom:12}},'?'),
              h('p',{style:{fontWeight:500,marginBottom:6}},'Cliquez pour selectionner votre export ERP'),
              h('p',{style:{fontSize:12,color:'var(--h)'}},'Le planning sera partage avec vos collegues')
            )
          )
        :detail
          ?h(VueDetail,{cmdId:detail,lignes:lignes,statuts:statuts,onToggle:toggle,onBack:function(){setDetail(null);}})
          :vue==='planning'
            ?h(VuePlanning,{lignes:lignes,statuts:statuts,onToggle:toggle,importDate:importDate,peutEditer:peutEditer,ecaOverride:ecaOverride})
            :vue==='charge'
              ?h(VueCharge,{lignes:lignes,onSem:function(s){setVue('planning');},ecaOverride:ecaOverride})
              :vue==='reporting'
                ?h(VueReporting,{lignes:lignes,statuts:statuts,onToggle:toggle,onCommande:function(id){setDetail(id);},ancienIds:ancienIds})
                :vue==='depart'
                  ?h(VueDepart,{lignes:lignes,statuts:statuts})
                  :h(VueECA,{ecaOverride:ecaOverride,setEcaOverride:setEcaOverride,peutImporter:peutImporter,setModal:setModal})
    ),
    modal==='edit'&&h(ModalMDP,{titre:'Deverrouiller OK/NOK',mdpAttendu:MDP_EDIT,onSuccess:function(){setPeutEditer(true);},onClose:function(){setModal(null);}}),
    modal==='import'&&h(ModalMDP,{titre:'Deverrouiller import ERP',mdpAttendu:MDP_IMPORT,onSuccess:function(){setPeutEditer(true);setPeutImporter(true);},onClose:function(){setModal(null);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
